<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Fondo degradado oscuro azul-morado -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020818"/>
      <stop offset="40%" stop-color="#0d1b40"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>

    <!-- Degradado del texto animado -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00eaff"/>
      <stop offset="35%"  stop-color="#a855f7"/>
      <stop offset="65%"  stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#00eaff"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-900 0;900 0;-900 0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Degradado subtítulo -->
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>

    <!-- Glow fuerte -->
    <filter id="glowStrong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="2" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow suave para estrellas -->
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glow luna -->
    <filter id="moonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Borde superior degradado -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00eaff" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#00eaff" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#a855f7" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#ec4899" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip para no salir del borde -->
    <clipPath id="mainClip">
      <rect width="900" height="200" rx="16"/>
    </clipPath>

  </defs>

  <!-- Fondo con bordes redondeados -->
  <rect width="900" height="200" rx="16" fill="url(#bgGrad)"/>

  <g clip-path="url(#mainClip)">

    <!-- Nebulosa de fondo izquierda -->
    <ellipse cx="120" cy="100" rx="140" ry="90" fill="#7b2ff7" opacity="0.07"/>
    <!-- Nebulosa derecha -->
    <ellipse cx="780" cy="100" rx="130" ry="80" fill="#00d4ff" opacity="0.06"/>
    <!-- Nebulosa central -->
    <ellipse cx="450" cy="180" rx="280" ry="60" fill="#ec4899" opacity="0.05"/>

    <!-- ══ ESTRELLAS ══ -->
    <!-- Fila 1 -->
    <circle cx="55"  cy="22"  r="1.4" fill="white" filter="url(#glowSoft)"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="38"  r="1"   fill="#a5f3fc"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="15"  r="1.8" fill="white"  filter="url(#glowSoft)"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="40"  r="1"   fill="#f0abfc"><animate attributeName="opacity" values="0.5;1;0.5" dur="4s"   repeatCount="indefinite"/></circle>
    <circle cx="500" cy="18"  r="1.5" fill="white"  filter="url(#glowSoft)"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="30"  r="1"   fill="#a5f3fc"><animate attributeName="opacity" values="0.6;1;0.6" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="12"  r="1.6" fill="white"  filter="url(#glowSoft)"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="830" cy="25"  r="1"   fill="#f0abfc"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="875" cy="45"  r="1.2" fill="white"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.7s" repeatCount="indefinite"/></circle>

    <!-- Fila 2 -->
    <circle cx="80"  cy="60"  r="1"   fill="#a5f3fc"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="190" cy="75"  r="1.3" fill="white"><animate attributeName="opacity" values="0.3;1;0.3"   dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="60"  r="1"   fill="white"><animate attributeName="opacity" values="0.5;1;0.5"   dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="55"  r="1.5" fill="white"  filter="url(#glowSoft)"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="70"  r="1"   fill="#f0abfc"><animate attributeName="opacity" values="0.6;1;0.6" dur="4.2s" repeatCount="indefinite"/></circle>

    <!-- ══ LUNA ══ -->
    <!-- Halo exterior -->
    <circle cx="82" cy="110" r="48" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.3">
      <animate attributeName="r" values="48;52;48" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Resplandor -->
    <circle cx="82" cy="110" r="36" fill="#c4b5fd" opacity="0.12" filter="url(#moonGlow)"/>
    <!-- Cuerpo de la luna (media luna con clip) -->
    <circle cx="82" cy="110" r="30" fill="#fef3c7" filter="url(#moonGlow)" opacity="0.95"/>
    <!-- Círculo que "recorta" para hacer la media luna -->
    <circle cx="96" cy="104" r="26" fill="#0d1b40"/>
    <!-- Cráteres sutiles -->
    <circle cx="68" cy="118" r="4"  fill="none" stroke="#d97706" stroke-width="0.5" opacity="0.3"/>
    <circle cx="78" cy="105" r="2.5" fill="none" stroke="#d97706" stroke-width="0.5" opacity="0.2"/>

    <!-- ══ PARTÍCULAS ORBITANDO ══ -->
    <circle r="3" fill="#00eaff" filter="url(#glowSoft)" opacity="0.9">
      <animateMotion dur="6s" repeatCount="indefinite" path="M82,110 m-55,0 a55,30 0 1,1 110,0 a55,30 0 1,1 -110,0"/>
    </circle>
    <circle r="2" fill="#ec4899" filter="url(#glowSoft)" opacity="0.8">
      <animateMotion dur="9s" repeatCount="indefinite" path="M82,110 m-65,0 a65,38 0 1,0 130,0 a65,38 0 1,0 -130,0"/>
    </circle>
    <circle r="1.5" fill="#a855f7" opacity="0.9">
      <animateMotion dur="12s" repeatCount="indefinite" path="M82,110 m-75,0 a75,45 0 1,1 150,0 a75,45 0 1,1 -150,0"/>
    </circle>

    <!-- ══ LÍNEAS DECORATIVAS LATERALES ══ -->
    <line x1="170" y1="105" x2="220" y2="105" stroke="url(#borderGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="170" y1="115" x2="200" y2="115" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>

    <!-- ══ TEXTO PRINCIPAL ══ -->
    <!-- Sombra del texto -->
    <text x="552" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="bold"
          text-anchor="middle" fill="#000" opacity="0.4" transform="translate(3,4)">Luna Bot</text>
    <!-- Texto principal con degradado animado -->
    <text x="552" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="bold"
          text-anchor="middle" fill="url(#textGrad)" filter="url(#glowStrong)">
      Luna Bot
      <animate attributeName="opacity" values="1;0.92;1" dur="3s" repeatCount="indefinite"/>
    </text>

    <!-- Versión -->
    <text x="552" y="148" font-family="Arial, sans-serif" font-size="20" font-weight="600"
          text-anchor="middle" fill="url(#subGrad)" letter-spacing="6" opacity="0.9">V 6 . 0</text>

    <!-- ══ LÍNEA DECORATIVA INFERIOR DEL TEXTO ══ -->
    <rect x="352" y="158" width="400" height="1.5" rx="1" fill="url(#borderGrad)" opacity="0.7"/>

    <!-- ══ DESTELLOS (GLITCH FLASHES) ══ -->
    <line x1="300" y1="0" x2="300" y2="200" stroke="#00eaff" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0.6;0;0" dur="5s" begin="0s"  repeatCount="indefinite"/>
    </line>
    <line x1="640" y1="0" x2="640" y2="200" stroke="#a855f7" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0;0.5;0;0;0" dur="7s" begin="2s"  repeatCount="indefinite"/>
    </line>

  </g>

  <!-- ══ BORDES DECORATIVOS ══ -->
  <!-- Línea superior -->
  <rect x="0" y="0" width="900" height="3" rx="2" fill="url(#borderGrad)"/>
  <!-- Línea inferior -->
  <rect x="0" y="197" width="900" height="3" rx="2" fill="url(#borderGrad)"/>
  <!-- Marco completo sutil -->
  <rect width="900" height="200" rx="16" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" opacity="0.6"/>

  <!-- ══ PUNTOS DECORATIVOS ESQUINAS ══ -->
  <circle cx="18" cy="18" r="4" fill="#a855f7" opacity="0.7" filter="url(#glowSoft)"/>
  <circle cx="882" cy="18" r="4" fill="#00eaff" opacity="0.7" filter="url(#glowSoft)"/>
  <circle cx="18" cy="182" r="4" fill="#ec4899" opacity="0.7" filter="url(#glowSoft)"/>
  <circle cx="882" cy="182" r="4" fill="#a855f7" opacity="0.7" filter="url(#glowSoft)"/>

</svg>
